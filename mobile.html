<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉林大学宿舍报修系统 - 移动端原型</title>
<style>
:root{
  --primary:#2F6FED;
  --primary-dark:#1E54C4;
  --primary-light:#E8F0FE;
  --success:#1FAA59;
  --success-light:#E6F7ED;
  --warning:#F5A623;
  --warning-light:#FEF3E0;
  --danger:#E5484D;
  --danger-light:#FCEAEA;
  --info:#7C5CFC;
  --info-light:#EFEAFE;
  --bg:#F2F4F7;
  --card:#FFFFFF;
  --text:#1F2430;
  --text-secondary:#6B7280;
  --text-tertiary:#9AA1AC;
  --border:#E8EAED;
  --radius:14px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#D9DEE6;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px 12px;
  min-height:100vh;
  color:var(--text);
}
/* ============ 外层信息 ============ */
.page-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.credit{
  font-size:12px;color:#6B7280;text-align:center;line-height:1.6;
  background:rgba(255,255,255,.6);padding:6px 14px;border-radius:20px;
}
/* ============ 手机框（深色机身 + 内屏 两层结构） ============ */
.phone{
  width:414px;
  height:844px;
  background:linear-gradient(165deg,#3a3d44,#16171a 55%);
  border-radius:58px;
  box-shadow:
    0 28px 64px rgba(20,30,50,.35),
    0 0 0 1.5px rgba(255,255,255,.08) inset,
    0 0 0 7px rgba(0,0,0,.35) inset;
  position:relative;
  padding:12px;
}
/* 电源键（右侧） */
.phone::before{
  content:'';position:absolute;right:-3px;top:198px;width:3px;height:78px;
  background:#1b1c1f;border-radius:2px 0 0 2px;
  box-shadow:-1px 0 0 rgba(255,255,255,.06) inset;
}
/* 音量键（左侧，上下两段） */
.phone::after{
  content:'';position:absolute;left:-3px;top:152px;width:3px;height:46px;
  background:#1b1c1f;border-radius:0 2px 2px 0;
  box-shadow:1px 0 0 rgba(255,255,255,.06) inset;
}
.phone-mute{
  position:absolute;left:-3px;top:118px;width:3px;height:24px;
  background:#1b1c1f;border-radius:0 2px 2px 0;z-index:1;
}
.phone-vol2{
  position:absolute;left:-3px;top:208px;width:3px;height:46px;
  background:#1b1c1f;border-radius:0 2px 2px 0;z-index:1;
}
.phone-screen{
  width:100%;height:100%;
  background:var(--bg);
  border-radius:46px;
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 0 2px rgba(0,0,0,.5);
}
.notch{
  position:absolute;top:13px;left:50%;transform:translateX(-50%);
  width:116px;height:32px;background:#0b0c10;border-radius:100px;
  z-index:50;
  box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;
}
.statusbar{
  height:50px;flex:0 0 50px;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;font-size:14px;font-weight:600;color:var(--text);background:transparent;z-index:40;
}
.statusbar .icons{display:flex;align-items:center;gap:5px;}
.screens{flex:1;position:relative;overflow:hidden;}
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .26s ease;
  z-index:1;
}
.screen.active{transform:translateX(0);z-index:5;}
.screen.under{transform:translateX(-30%);z-index:2;}
.screen-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen-scroll::-webkit-scrollbar{display:none;}

/* ============ 顶部导航 ============ */
.topnav{
  flex:0 0 50px;display:flex;align-items:center;padding:0 6px;position:relative;
  background:var(--bg);
}
.topnav .nav-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--text);flex:0 0 38px;
}
.topnav .nav-title{
  position:absolute;left:0;right:0;text-align:center;font-size:17px;font-weight:600;pointer-events:none;
}
.topnav .nav-right{flex:0 0 38px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
.topnav .nav-right-text{font-size:13px;color:var(--primary);font-weight:500;cursor:pointer;white-space:nowrap;}

/* ============ 通用卡片 ============ */
.card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:0 1px 2px rgba(20,30,50,.04);
}
.section{padding:14px 16px;}
.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.section-title .more{font-size:12px;color:var(--text-tertiary);font-weight:400;cursor:pointer;}

/* ============ 按钮 ============ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  height:46px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
  border:none;width:100%;transition:transform .08s, opacity .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:disabled{background:#B9CCF4;cursor:not-allowed;}
.btn-outline{background:#fff;color:var(--primary);border:1px solid var(--primary);}
.btn-danger-outline{background:#fff;color:var(--danger);border:1px solid var(--danger);}
.btn-ghost{background:var(--bg);color:var(--text);}
.btn-sm{height:36px;font-size:13px;border-radius:10px;}
.btn-row{display:flex;gap:10px;}

/* ============ 表单 ============ */
.field-label{font-size:13px;color:var(--text-secondary);margin-bottom:8px;font-weight:500;}
.field-label .req{color:var(--danger);margin-left:2px;}
textarea, input[type=text], input[type=datetime-local], input[type=password]{
  width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 12px;
  font-size:14px;font-family:inherit;color:var(--text);background:#fff;
}
textarea{resize:none;min-height:90px;line-height:1.5;}
input::placeholder, textarea::placeholder{color:var(--text-tertiary);}
textarea:focus, input:focus{outline:none;border-color:var(--primary);}

.chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  padding:9px 14px;border-radius:10px;background:#fff;border:1px solid var(--border);
  font-size:13.5px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;
  -webkit-tap-highlight-color:transparent;
}
.chip.selected{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);font-weight:600;}

.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.type-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0;border-radius:12px;
  cursor:pointer;border:1.5px solid transparent;-webkit-tap-highlight-color:transparent;
}
.type-item.selected{background:var(--primary-light);border-color:var(--primary);}
.type-item .ic{
  width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.type-item.selected .ic{background:#fff;}
.type-item span{font-size:12px;color:var(--text-secondary);}
.type-item.selected span{color:var(--primary-dark);font-weight:600;}

.switch-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.switch{width:46px;height:26px;border-radius:13px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex:0 0 46px;}
.switch.on{background:var(--primary);}
.switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s;}
.switch.on .knob{left:23px;}

/* ============ 图片上传 ============ */
.upload-grid{display:flex;flex-wrap:wrap;gap:10px;}
.upload-tile{
  width:72px;height:72px;border-radius:10px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;
}
.upload-tile .del{
  position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.upload-add{
  width:72px;height:72px;border-radius:10px;border:1.5px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-tertiary);font-size:11px;cursor:pointer;background:#fbfbfc;
}

/* ============ 状态标签 ============ */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;white-space:nowrap;}
.badge-pending{background:var(--warning-light);color:#B5740E;}
.badge-assigned{background:var(--info-light);color:#5B3FD6;}
.badge-repairing{background:var(--primary-light);color:var(--primary-dark);}
.badge-evaluate{background:#E0F7F4;color:#0E8A78;}
.badge-completed{background:var(--success-light);color:#16834A;}
.badge-cancelled{background:#EEF0F2;color:#7A828E;}
.badge-rejected{background:var(--danger-light);color:#C23337;}

/* ============ 工单列表卡片 ============ */
.ticket-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ticket-card:active{background:#FAFBFC;}
.ticket-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.ticket-type{display:flex;align-items:center;gap:8px;}
.ticket-type .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 34px;}
.ticket-id{font-size:11.5px;color:var(--text-tertiary);}
.ticket-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;margin:6px 0 8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ticket-meta{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--text-tertiary);}

/* ============ 分段控件 / tabs ============ */
.segment{display:flex;background:#fff;border-radius:11px;padding:3px;gap:2px;}
.segment .seg-item{flex:1;text-align:center;padding:8px 4px;font-size:12.5px;border-radius:9px;color:var(--text-secondary);cursor:pointer;font-weight:500;white-space:nowrap;}
.segment .seg-item.active{background:var(--primary);color:#fff;font-weight:600;}
.tab-underline{display:flex;border-bottom:1px solid var(--border);background:#fff;}
.tab-underline .tu-item{flex:1;text-align:center;padding:13px 0;font-size:14px;color:var(--text-secondary);position:relative;cursor:pointer;font-weight:500;}
.tab-underline .tu-item.active{color:var(--primary);font-weight:700;}
.tab-underline .tu-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--primary);border-radius:3px;}

/* ============ 时间线 ============ */
.timeline{padding-left:6px;}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:22px;}
.tl-item:last-child{padding-bottom:0;}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;flex:0 0 22px;}
.tl-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--border);color:#fff;flex:0 0 22px;}
.tl-dot.done{background:var(--success);}
.tl-dot.now{background:var(--primary);box-shadow:0 0 0 4px var(--primary-light);}
.tl-dot.fail{background:var(--danger);}
.tl-line{width:2px;flex:1;background:var(--border);margin-top:2px;}
.tl-line.done{background:var(--success);}
.tl-body{flex:1;padding-top:1px;}
.tl-title{font-size:14px;font-weight:600;color:var(--text);}
.tl-title.muted{color:var(--text-tertiary);font-weight:500;}
.tl-sub{font-size:12.5px;color:var(--text-tertiary);margin-top:3px;line-height:1.5;}

/* ============ 星级评分 ============ */
.star-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.star-row .star-label{font-size:14px;color:var(--text);font-weight:500;}
.stars{display:flex;gap:4px;}
.star{width:26px;height:26px;cursor:pointer;}

/* ============ 列表行 ============ */
.list-row{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.list-row:active{background:#FAFBFC;}
.list-row + .list-row{border-top:1px solid var(--border);}
.list-row .lr-left{display:flex;align-items:center;gap:11px;}
.lr-text{font-size:14.5px;color:var(--text);}
.lr-sub{font-size:12px;color:var(--text-tertiary);margin-top:2px;}
.lr-chevron{color:var(--text-tertiary);}

/* ============ 消息行 ============ */
.msg-row{display:flex;gap:11px;padding:14px 16px;background:#fff;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;}
.msg-row:active{background:#FAFBFC;}
.msg-row + .msg-row{border-top:1px solid var(--border);}
.msg-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 38px;}
.msg-body{flex:1;min-width:0;}
.msg-top{display:flex;align-items:center;justify-content:space-between;}
.msg-title{font-size:14px;font-weight:600;color:var(--text);}
.msg-time{font-size:11.5px;color:var(--text-tertiary);}
.msg-content{font-size:12.5px;color:var(--text-secondary);margin-top:3px;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);position:absolute;top:16px;left:8px;}

/* ============ 首页专属 ============ */
.home-header{padding:18px 16px 4px;}
.greet{font-size:20px;font-weight:700;color:var(--text);}
.dorm-chip{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:12.5px;color:var(--text-secondary);background:#fff;padding:5px 10px;border-radius:8px;}
.cta-repair{
  margin:14px 16px 0;border-radius:18px;padding:20px;
  background:linear-gradient(135deg,#2F6FED,#5B8DF8);color:#fff;position:relative;overflow:hidden;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.cta-repair::after{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.10);}
.cta-repair .cta-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;}
.cta-repair .cta-sub{font-size:12.5px;opacity:.88;margin-top:5px;}
.cta-repair .cta-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);}

.active-ticket{margin:14px 16px 0;}
.notice-strip{
  margin:0 16px;background:var(--warning-light);border-radius:10px;padding:10px 12px;
  display:flex;align-items:center;gap:8px;font-size:12.5px;color:#8A5A0A;cursor:pointer;
}

.bottom-tabbar{
  flex:0 0 64px;display:flex;background:#fff;border-top:1px solid var(--border);
  padding-bottom:8px;
}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--text-tertiary);cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;padding-top:6px;}
.tab-btn.active{color:var(--primary);}
.tab-btn span{font-size:11px;font-weight:500;}
.tab-badge{position:absolute;top:2px;right:calc(50% - 17px);background:var(--danger);color:#fff;font-size:10px;
  font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* ============ 空状态 ============ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 30px;text-align:center;color:var(--text-tertiary);}
.empty-state .es-title{font-size:14px;color:var(--text-secondary);margin-top:14px;font-weight:500;}
.empty-state .es-sub{font-size:12.5px;margin-top:6px;line-height:1.6;}

/* ============ Toast / Modal ============ */
.toast{
  position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(30,32,38,.92);color:#fff;font-size:13px;padding:10px 18px;border-radius:30px;
  z-index:100;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{
  position:absolute;inset:0;background:rgba(15,18,25,.45);z-index:90;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-box{width:280px;background:#fff;border-radius:16px;padding:22px 20px 16px;text-align:center;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);}
.modal-msg{font-size:13.5px;color:var(--text-secondary);margin-top:10px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;margin-top:18px;}

/* ============ 登录页 ============ */
.login-screen{justify-content:flex-start;}
.login-top{padding:64px 30px 24px;display:flex;flex-direction:column;align-items:center;}
.login-badge{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#2F6FED,#5B8DF8);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.login-title{font-size:20px;font-weight:700;color:var(--text);}
.login-sub{font-size:12.5px;color:var(--text-tertiary);margin-top:5px;}
.login-form{padding:6px 28px;display:flex;flex-direction:column;gap:14px;}
.login-form label{font-size:12.5px;color:var(--text-secondary);margin-bottom:6px;display:block;font-weight:500;}

/* 个人中心 */
.profile-header{padding:26px 20px 18px;display:flex;align-items:center;gap:14px;background:#fff;}
.avatar{width:58px;height:58px;border-radius:50%;background:var(--primary);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 58px;}
.profile-name{font-size:17px;font-weight:700;color:var(--text);}
.profile-sub{font-size:12.5px;color:var(--text-tertiary);margin-top:3px;}

.info-card-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;}
.info-card-row .k{color:var(--text-tertiary);}
.info-card-row .v{color:var(--text);font-weight:500;}

hr.div{border:none;border-top:1px solid var(--border);margin:0;}
.repair-photo{width:64px;height:64px;border-radius:9px;object-fit:cover;}
.repair-photo-mock{width:64px;height:64px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;}

/* ============ 角色选择登录卡 ============ */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.role-card{
  background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.role-card.selected{border-color:var(--primary);background:var(--primary-light);}
.role-card .rc-ic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--primary);}
.role-card.selected .rc-ic{background:#fff;}
.role-card .rc-name{font-size:13.5px;font-weight:700;color:var(--text);}
.role-card .rc-desc{font-size:10.5px;color:var(--text-tertiary);line-height:1.4;}

/* ============ 统计卡（总览类页面） ============ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px;}
.stat-card .stat-label{font-size:12px;color:var(--text-tertiary);}
.stat-card .stat-value{font-size:24px;font-weight:700;margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-row .bar-label{font-size:12.5px;color:var(--text-secondary);width:42px;flex:0 0 42px;}
.bar-track{flex:1;height:8px;background:var(--bg);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--primary);border-radius:5px;}
.bar-row .bar-count{font-size:11.5px;color:var(--text-tertiary);flex:0 0 36px;text-align:right;}

/* ============ 派单候选人卡 ============ */
.cand-row{background:#fff;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;border:1.5px solid transparent;}
.cand-row.rec{border-color:var(--primary);background:var(--primary-light);}
.cand-name{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cand-tag{font-size:10.5px;background:var(--bg);color:var(--text-secondary);padding:2px 7px;border-radius:6px;font-weight:500;}

function ts(daysAgo, hoursAgo=0){ return Date.now() - daysAgo*86400000 - hoursAgo*3600000; }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------------- Flask API 同步层（与桌面端共享同一 MySQL） ---------------- */
const API_BASE = 'http://localhost:5001';
const ALL_TABLES = ['user_info','repair_order','repairman_skill','assign_record',
  'repair_feedback','material_usage','notice','complaint','message_push','sys_config','sys_log'];
const TABLE_PK = {
  user_info:'user_id', repair_order:'order_id', repairman_skill:'repairman_id',
  assign_record:'assign_id', repair_feedback:'feedback_id', material_usage:'record_id',
  notice:'notice_id', complaint:'complaint_id', message_push:'push_id',
  sys_config:'config_id', sys_log:'log_id'
};
const SYNC = {
  enabled: false,
  async init(){
    try {
      const r = await fetch(`${API_BASE}/api/ping`, { signal: AbortSignal.timeout(3000) });
      const d = await r.json();
      if(d.ok){ this.enabled=true; await this.pullAll(); }
    } catch(e){ console.warn('Flask 未启动，离线模式'); }
  },
  async pullAll(){
    if(!this.enabled) return;
    for(const t of ALL_TABLES){
      try {
        const rows = await fetch(`${API_BASE}/api/${t}`).then(r=>r.json());
        if(Array.isArray(rows) && rows.length>0) DB._d[t]=rows;
      } catch(e){}
    }
    DB.save();
  },
  async push(table, op, row, id){
    if(!this.enabled) return;
    try {
      if(op==='insert'){
        await fetch(`${API_BASE}/api/${table}`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(row) });
      } else if(op==='update'){
        await fetch(`${API_BASE}/api/${table}/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(row) });
      } else if(op==='delete'){
        await fetch(`${API_BASE}/api/${table}/${id}`,{ method:'DELETE' });
      }
    } catch(e){ console.warn(`push [${table}] 失败`,e); }
  }
};

/* ---------------- DB（localStorage 缓存 + MySQL 同步） ---------------- */
const DB = {
  KEY: 'jlu_dorm_repair_mobile_db',
  _d: null,
  load(){ const raw=localStorage.getItem(this.KEY); this._d = raw?JSON.parse(raw):null; if(!this._d){ this._d=createSeedData(); this.save(); } return this._d; },
  save(){ localStorage.setItem(this.KEY, JSON.stringify(this._d)); },
  get(table){ return (this._d[table]||[]).slice(); },
  insert(table,row){
    if(!this._d[table]) this._d[table]=[];
    this._d[table].push(row); this.save();
    SYNC.push(table,'insert',row);
    return row;
  },
  update(table,idField,id,patch){
    const arr=this._d[table]||[]; const i=arr.findIndex(r=>r[idField]===id);
    if(i>=0){ arr[i]={...arr[i],...patch}; this.save(); SYNC.push(table,'update',patch,id); return arr[i]; }
    return null;
  },
  reset(){ this._d = createSeedData(); this.save(); }
};
DB.load();
SYNC.init();

function getSmartCandidates(faultType){
  const skills = DB.get('repairman_skill');
  const matched = skills.filter(s=>s.skill_tag===faultType || faultType==='其他');
  const pool = matched.length?matched:skills;
  return pool.slice().sort((a,b)=>a.workload-b.workload).map(s=>({...s, name:getUserName(s.repairman_id)}));
}

/* ---------------- 状态机：工单状态变更 + 消息推送 ---------------- */
function buildPushMessages(order, newStatus, meta){
  const msgs=[]; const now=Date.now();
  const fmsg=(userId,content,pushType)=>({ push_id:genId('MP'), user_id:userId, order_id:order.order_id, push_type:pushType||'status_change', content, push_time:now, is_read:false });
  switch(newStatus){
    case 'assigned':
      msgs.push(fmsg(order.user_id, `您的工单 ${order.order_id}（${order.fault_type}）已派单，请等待维修人员上门。`,'assigned'));
      if(meta.repairman_id) msgs.push(fmsg(meta.repairman_id, `您有新的维修任务：${order.order_id}（${order.fault_type}），地点：${order.address}。`,'assigned'));
      msgs.push(fmsg('U007', `工单 ${order.order_id} 已完成派单。`,'assigned'));
      break;
    case 'repairing':
      msgs.push(fmsg(order.user_id, `维修人员已接单，正在前往 ${order.address} 进行维修，请保持联系。`,'repairing'));
      break;
    case 'to_evaluate':
      msgs.push(fmsg(order.user_id, `您的工单 ${order.order_id}（${order.fault_type}）维修已完成，请进行评价。`,'evaluate_remind'));
      break;
    case 'completed':
      msgs.push(fmsg('U007', `工单 ${order.order_id} 已完成评价，全流程结束。`,'status_change'));
      break;
    case 'rejected':
      msgs.push(fmsg('U007', `工单 ${order.order_id} 被标记为【已退回】，请重新派单。`,'status_change'));
      msgs.push(fmsg(order.user_id, `您的工单 ${order.order_id} 维修遇到问题，管理员将重新安排。`,'status_change'));
      break;
    case 'cancelled':
      msgs.push(fmsg('U007', `工单 ${order.order_id} 已被取消。`,'status_change'));
      break;
  }
  return msgs;
}
function updateOrderStatus(orderId, newStatus, meta={}){
  DB.update('repair_order','order_id',orderId,{status:newStatus, ...meta});
  const order = getOrder(orderId);
  buildPushMessages(order,newStatus,meta).forEach(p=>DB.insert('message_push',p));
}
function assignOrder(orderId, repairmanId, isAuto){
  DB.insert('assign_record',{ assign_id:genId('AS'), order_id:orderId, repairman_id:repairmanId, assign_time:Date.now(), is_auto:isAuto });
  updateOrderStatus(orderId,'assigned',{ assign_time:Date.now(), repairman_id:repairmanId });
  const skill = getRepairmanSkill(repairmanId);
  if(skill) DB.update('repairman_skill','repairman_id',repairmanId,{ workload: skill.workload+1 });
}

let navStack = ['login'];
const screensEl = document.getElementById('screens');
const renderedScreens = {};

function renderScreen(key){
  const [name] = key.split(':');
  const param = key.slice(name.length+1);
  const fn = SCREEN_RENDERERS[name];
  const html = fn ? fn(param) : `<div class="section">页面未找到：${esc(name)}</div>`;
  let el = renderedScreens[key];
  if(!el){ el=document.createElement('div'); el.className='screen'; el.dataset.key=key; screensEl.appendChild(el); renderedScreens[key]=el; }
  el.innerHTML = html;
  return el;
}
function showStack(){
  const activeKey = navStack[navStack.length-1];
  const underKey  = navStack.length>1 ? navStack[navStack.length-2] : null;
  renderScreen(activeKey);
  if(underKey && !renderedScreens[underKey]) renderScreen(underKey);
  Object.keys(renderedScreens).forEach(k=>{
    const el = renderedScreens[k];
    el.classList.remove('active','under');
    if(k===activeKey) el.classList.add('active');
    else if(k===underKey) el.classList.add('under');
  });
  renderTabbar();
  updateTabbarVisibility();
}
function go(key){ navStack.push(key); showStack(); }
function dropScreen(key){ if(renderedScreens[key]){ renderedScreens[key].remove(); delete renderedScreens[key]; } }
function replaceTop(key){ navStack[navStack.length-1]=key; dropScreen(key); showStack(); }
function back(){ if(navStack.length<=1) return; const leaving=navStack.pop(); dropScreen(leaving); showStack(); }
function refresh(){ const k=navStack[navStack.length-1]; dropScreen(k); showStack(); }
function resetToTab(tabKey){ navStack=[tabKey]; showStack(); }
function switchTab(tabKey){ resetToTab(tabKey); }

function updateTabbarVisibility(){
  if(!currentUser){ document.getElementById('bottomTabbar').style.display='none'; return; }
  const top = navStack[navStack.length-1].split(':')[0];
  const tabs = TABS[currentUser.role];
  const isRoot = tabs.some(t=>t.key===top);
  document.getElementById('bottomTabbar').style.display = isRoot?'flex':'none';
  if(isRoot){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===top));
  }
}
function renderTabbar(){
  const bar = document.getElementById('bottomTabbar');
  if(!currentUser){ bar.innerHTML=''; return; }
  const tabs = TABS[currentUser.role];
  const top = navStack[navStack.length-1].split(':')[0];
  bar.innerHTML = tabs.map(t=>{
    const unread = t.key==='messages' ? DB.get('message_push').filter(m=>m.user_id===currentUser.user_id && !m.is_read).length : 0;
    return `<div class="tab-btn ${top===t.key?'active':''}" data-tab="${t.key}" onclick="switchTab('${t.key}')">
      ${ICON[t.icon]}
      <span>${t.label}</span>
      ${unread>0?`<div class="tab-badge">${unread>9?'9+':unread}</div>`:''}
    </div>`;
  }).join('');
}

function orderTimeline(order){
  const assign = getOrderAssign(order.order_id);
  const repairman = assign ? getUser(assign.repairman_id) : null;
  const feedback = DB.get('repair_feedback').find(f=>f.order_id===order.order_id);
  if(order.status==='cancelled'){
    return `<div class="timeline">
      <div class="tl-item"><div class="tl-dot-col"><div class="tl-dot done">${ICON.check}</div></div><div class="tl-body"><div class="tl-title">提交工单</div><div class="tl-sub">${fmtTime(order.create_time)}</div></div></div>

    </div>`;
  }
  const steps = [
    { key:'pending', label:'提交工单', time:order.create_time, sub:`由 ${getUserName(order.user_id)} 提交` },
    { key:'assigned', label:'已派单', time:order.assign_time, sub: assign?`派给 ${repairman?repairman.name:assign.repairman_id}`:'' },
    { key:'repairing', label:'维修中', time:order.repair_time, sub: order.status==='rejected'?'':'维修人员已上门' },
    { key:'to_evaluate', label:'待评价', time:order.complete_time, sub: order.repair_result?'维修完成，等待评价':'' },
    { key:'completed', label:'已完成', time: order.status==='completed'?order.complete_time:null, sub: feedback?`评分 速度${feedback.speed_score}★ 态度${feedback.attitude_score}★ 质量${feedback.quality_score}★`:'' },
  ];
  const order_seq = ['pending','assigned','repairing','to_evaluate','completed'];
  const curIdx = order.status==='rejected' ? 2 : order_seq.indexOf(order.status);
  return `<div class="timeline">` + steps.map((s,i)=>{
    let dotCls='', lineCls='';
    if(order.status==='rejected' && i===2){ dotCls='fail'; }
    else if(i<curIdx || order.status==='completed'){ dotCls='done'; lineCls='done'; }
    else if(i===curIdx){ dotCls='now'; }
    const titleCls = (dotCls==='' ) ? 'muted' : '';
    return `<div class="tl-item">
      <div class="tl-dot-col">
        <div class="tl-dot ${dotCls}">${dotCls==='done'?ICON.check:dotCls==='fail'?ICON.x:''}</div>
        ${i<steps.length-1?`<div class="tl-line ${lineCls}"></div>`:''}
      </div>
      <div class="tl-body">
        <div class="tl-title ${titleCls}">${s.label}${order.status==='rejected'&&i===2?'（无法维修）':''}</div>
        <div class="tl-sub">${s.time?fmtTime(s.time):'等待中'}${s.sub?' · '+esc(s.sub):''}</div>
      </div>
    </div>`;
  }).join('') + `</div>`;
}

    ${photos.length<5?`<div class="upload-add" onclick="addPhoto('${idPrefix}')">${ICON.camera}<span>添加照片</span></div>`:''}
  </div>`;
}
const PHOTO_STATE = {};
function addPhoto(idPrefix){
  const colors=['#2F6FED','#16834A','#B5740E','#5B3FD6','#0E8FB5','#E5484D'];
  if(!PHOTO_STATE[idPrefix]) PHOTO_STATE[idPrefix]=[];
  if(PHOTO_STATE[idPrefix].length>=5) return;
  PHOTO_STATE[idPrefix].push(colors[PHOTO_STATE[idPrefix].length % colors.length]);
  document.getElementById(idPrefix+'-grid').outerHTML = uploadGridHtml(idPrefix, PHOTO_STATE[idPrefix]);
}
function removePhoto(idPrefix, i){
  PHOTO_STATE[idPrefix].splice(i,1);
  document.getElementById(idPrefix+'-grid').outerHTML = uploadGridHtml(idPrefix, PHOTO_STATE[idPrefix]);
}

  const order = getOrder(orderId);

  const scores = {speed:0, attitude:0, quality:0};
  window.__evalScores = scores;
  const row = (key,label)=>`<div class="star-row">
    <span class="star-label">${label} <span class="req">*</span></span>
    <div class="stars" id="eval-stars-${key}">${[1,2,3,4,5].map(n=>`<span class="star" onclick="setEvalScore('${key}',${n})">${ICON.star_o}</span>`).join('')}</div>
  </div>`;
  return `${topnav('维修评价')}
  <div class="screen-scroll"><div class="section">

      <div class="section-title" style="margin-bottom:4px;">服务评价</div>

      <div style="height:10px;"></div>
      <div class="field-label">补充建议（可选）</div>
      <textarea id="eval-suggestion" placeholder="您的宝贵意见将帮助我们改进服务…"></textarea>
    </div>
    <div style="height:16px;"></div>
    <button class="btn btn-primary" onclick="handleSubmitEval('${orderId}')">提交评价</button>
    <div style="height:10px;"></div>
  </div></div>`;
}
function setEvalScore(key, val){
  window.__evalScores[key]=val;
  document.querySelectorAll(`#eval-stars-${key} .star`).forEach((el,i)=>{ el.innerHTML = (i<val)?ICON.star_f:ICON.star_o; });
}
function handleSubmitEval(orderId){
  const s = window.__evalScores||{};
  if(!s.speed||!s.attitude||!s.quality){ showToast('请完成全部评分（三项均需选择）'); return; }
  const suggestion = document.getElementById('eval-suggestion').value.trim();
  DB.insert('repair_feedback', { feedback_id:genId('FB'), order_id:orderId, speed_score:s.speed, attitude_score:s.attitude, quality_score:s.quality, suggestion, feedback_time:Date.now() });
  const assign = getOrderAssign(orderId);
  if(assign){
    const allFb = DB.get('repair_feedback').filter(f=>{ const a=getOrderAssign(f.order_id); return a && a.repairman_id===assign.repairman_id; });
    const avg = allFb.reduce((sum,f)=>sum+(f.speed_score+f.attitude_score+f.quality_score)/3,0)/allFb.length;
    DB.update('repairman_skill','repairman_id',assign.repairman_id,{ avg_score: Math.round(avg*10)/10 });
    const sk = getRepairmanSkill(assign.repairman_id);
    if(sk) DB.update('repairman_skill','repairman_id',assign.repairman_id,{ workload: Math.max(0, sk.workload-1) });
  }
  updateOrderStatus(orderId,'completed',{ complete_time:Date.now() });
  showToast('评价提交成功，感谢您的反馈！');
  back();
}

function buildingOrders(building){
  const buildingUserIds = DB.get('user_info').filter(u=>u.dorm_building===building).map(u=>u.user_id);
  return DB.get('repair_order').filter(o=> buildingUserIds.includes(o.user_id) || (o.address && o.address.includes(building)));
}
function screen_dorm_overview(){
  const building = currentUser.dorm_building;
  const all = buildingOrders(building);
  const byStatus={}; all.forEach(o=>{ byStatus[o.status]=(byStatus[o.status]||0)+1; });
  const byFault={}; all.forEach(o=>{ byFault[o.fault_type]=(byFault[o.fault_type]||0)+1; });
  const topFault = Object.entries(byFault).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxCount = topFault.length?topFault[0][1]:1;
  return `<div class="screen-scroll">
    <div class="home-header">
      <div class="greet">${esc(currentUser.name)}，你好 👋</div>
      <div class="dorm-chip">${ICON.building}${esc(building)} · 宿舍管理员</div>
    </div>
    <div class="section">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">报修总量</div><div class="stat-value" style="color:var(--primary)">${all.length}</div></div>
        <div class="stat-card"><div class="stat-label">待派单</div><div class="stat-value" style="color:var(--text-secondary)">${byStatus.pending||0}</div></div>
        <div class="stat-card"><div class="stat-label">维修中</div><div class="stat-value" style="color:var(--warning)">${(byStatus.assigned||0)+(byStatus.repairing||0)}</div></div>
        <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value" style="color:var(--success)">${byStatus.completed||0}</div></div>
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <div class="card">
        <div class="section-title" style="margin-bottom:10px;">高频故障类型 TOP${topFault.length}</div>
        ${topFault.length?topFault.map(([type,count])=>`
          <div class="bar-row"><span class="bar-label">${esc(type)}</span><div class="bar-track"><div class="bar-fill" style="width:${count/maxCount*100}%;background:${typeColor(type)}"></div></div><span class="bar-count">${count} 条</span></div>
        `).join(''):emptyState('本楼栋暂无报修记录')}
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <div class="cta-repair" onclick="go('register')">
        <div class="cta-title">${ICON.plus} 协助登记报修</div>
        <div class="cta-sub">为不便使用系统的同学线下代为登记工单</div>
        <div class="cta-arrow">${ICON.chevron}</div>
      </div>
    </div>
    <div style="height:14px;"></div>
  </div>`;
}

function handleDormRegister(){
  const name = document.getElementById('reg-name').value.trim();
  const contact = document.getElementById('reg-contact').value.trim();
  const faultType = getSelectedType('register');
  const address = document.getElementById('reg-address').value.trim();
  const desc = document.getElementById('reg-desc').value.trim();
  const company = document.getElementById('reg-company-switch').classList.contains('on');
  if(!name || !faultType || !address || !desc){ showToast('请完整填写信息'); return; }
  const order = {
    order_id:'JD'+Date.now(), user_id:currentUser.user_id, fault_type:faultType,
    description:`【宿管代登记·${name}${contact?'·'+contact:''}】${desc}`,
    img_url:'', address, appoint_time:'', need_company:company, status:'pending', create_time:Date.now(),
    assign_time:null, repair_time:null, complete_time:null, repair_result:'', complete_img:''
  };
  DB.insert('repair_order', order);
  DB.insert('message_push', { push_id:genId('MP'), user_id:'U007', order_id:order.order_id, push_type:'new_order', content:`新工单待派单：${order.order_id}（${order.fault_type}），${order.address}（宿管代登记）。`, push_time:Date.now(), is_read:false });
  showToast('代登记成功！');
  back();
}

    </div>
    <div style="height:10px;"></div>
  </div></div>`;

function materialRowsHtml(){
  return materialRows.map((m,i)=>`<div class="mat-row">
    <input type="text" placeholder="耗材名称" value="${esc(m.name)}" oninput="materialRows[${i}].name=this.value">
    <input type="number" class="mat-qty" min="1" value="${m.qty}" oninput="materialRows[${i}].qty=parseInt(this.value)||1">
    ${materialRows.length>1?`<div class="mat-del" onclick="removeMaterialRow(${i})">×</div>`:'<div style="width:36px;flex:0 0 36px;"></div>'}
  </div>`).join('');
}
function addMaterialRow(){ materialRows.push({name:'',qty:1}); document.getElementById('rr-materials').innerHTML = materialRowsHtml(); }
function removeMaterialRow(i){ materialRows.splice(i,1); document.getElementById('rr-materials').innerHTML = materialRowsHtml(); }
function handleRepairReject(orderId){
  const result = document.getElementById('rr-result').value.trim();
  if(!result){ showToast('请先填写维修结果说明'); return; }
  confirmDialog('标记无法维修','确认标记为无法维修？系统将通知管理员重新派单。', ()=>{
    updateOrderStatus(orderId,'rejected',{ repair_result:result });
    showToast('已标记无法维修，管理员将重新派单');
    back();
  }, true);
}
function handleRepairComplete(orderId){
  const result = document.getElementById('rr-result').value.trim();
  if(!result){ showToast('请填写维修结果说明'); return; }
  materialRows.filter(m=>m.name.trim()).forEach(m=>{
    DB.insert('material_usage', { record_id:genId('MU'), order_id:orderId, material_name:m.name.trim(), quantity:m.qty||1, use_time:Date.now() });
  });
  updateOrderStatus(orderId,'to_evaluate',{ repair_result:result, repair_time: getOrder(orderId).repair_time||Date.now(), complete_time:Date.now() });
  showToast('维修记录已提交！');
  back();
}

function workbenchComplaintHtml(){
  const complaints = DB.get('complaint').slice().sort((a,b)=>b.create_time-a.create_time);
  if(!complaints.length) return emptyState('暂无投诉/建议');
  return complaints.map(c=>`
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <span style="font-size:11.5px;color:var(--text-tertiary);">${esc(getUserName(c.user_id))} · ${fmtDate(c.create_time)} · ${c.type==='order'?('工单 '+c.order_id):'系统建议'}</span>
        <span class="badge ${c.status==='resolved'?'badge-completed':c.status==='closed'?'badge-cancelled':'badge-pending'}">${COMPLAINT_STATUS_LABEL[c.status]||c.status}</span>
      </div>
      <div style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;">${esc(c.content)}</div>
      ${c.reply_content?`<div style="padding:9px 10px;background:var(--bg);border-radius:9px;font-size:12.5px;color:var(--text-secondary);margin-bottom:8px;"><b style="color:var(--text);">已回复：</b>${esc(c.reply_content)}</div>`:''}
      <button class="btn btn-outline btn-sm" style="width:auto;padding:0 14px;" onclick="openComplaintReplyModal('${c.complaint_id}')">${c.reply_content?'修改处理':'处理'}</button>
    </div>`).join('');
}
function openComplaintReplyModal(complaintId){
  const c = DB.get('complaint').find(c=>c.complaint_id===complaintId);
  if(!c) return;
  const opts = ['pending','processing','resolved','closed'];
  showModal({
    title:`处理投诉 · ${complaintId}`,
    bodyHtml:`<div style="text-align:left;margin-top:6px;">
      <div style="font-size:12.5px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6;">${esc(c.content)}</div>
      <div class="field-label">处理状态</div>
      <select id="cr-status">${opts.map(o=>`<option value="${o}" ${c.status===o?'selected':''}>${COMPLAINT_STATUS_LABEL[o]}</option>`).join('')}</select>
      <div style="height:10px;"></div>
      <div class="field-label">回复内容</div>
      <textarea id="cr-reply" style="min-height:70px;">${esc(c.reply_content)}</textarea>
    </div>`,
    okText:'保存', wide:true,
    onOk: ()=>{
      const status = document.getElementById('cr-status').value;
      const reply = document.getElementById('cr-reply').value.trim();
      DB.update('complaint','complaint_id',complaintId,{ status, reply_content:reply, reply_user_id:currentUser.user_id, reply_time:Date.now() });
      if(reply) DB.insert('message_push',{ push_id:genId('MP'), user_id:c.user_id, order_id:c.order_id||null, push_type:'complaint_reply', content:`您提交的投诉/建议已收到回复：${reply.slice(0,40)}${reply.length>40?'…':''}`, push_time:Date.now(), is_read:false });
      showToast('处理结果已保存');
      refresh();
    }
  });
}

  const roleLabels={all:'全体',student:'学生',dorm_admin:'宿管',repairman:'维修人员',admin:'管理员'};
  return `
    <div class="card" style="margin-bottom:14px;">
      <div class="section-title" style="margin-bottom:8px;">发布新公告</div>
      <div class="field-label">标题 <span class="req">*</span></div>
      <input type="text" id="nt-title" placeholder="公告标题">
      <div style="height:12px;"></div>
      <div class="field-label">内容 <span class="req">*</span></div>
      <textarea id="nt-content" placeholder="公告正文…"></textarea>
      <div style="height:12px;"></div>
      <div class="field-label">目标角色</div>
      <select id="nt-target">
        <option value="all">全体</option><option value="student">学生</option><option value="dorm_admin">宿管</option><option value="repairman">维修人员</option><option value="admin">管理员</option>
      </select>
      <div style="height:14px;"></div>
      <button class="btn btn-primary" onclick="handlePublishNotice()">发布公告</button>
    </div>
    <div class="section-title" style="padding:0 2px;">已发布公告</div>
    ${notices.length?notices.map(n=>`
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:700;color:var(--text);">${esc(n.title)}</div>
            <div style="font-size:11.5px;color:var(--text-tertiary);margin:3px 0 6px;">${fmtTime(n.publish_time)} · 目标：${roleLabels[n.target_role]||n.target_role}</div>
            <div style="font-size:12.5px;color:var(--text-secondary);line-height:1.6;">${esc(n.content)}</div>
          </div>
          <span class="badge ${n.status==='active'?'badge-completed':'badge-cancelled'}">${n.status==='active'?'已发布':'已撤回'}</span>
        </div>
        <div style="height:8px;"></div>
        ${n.status==='active'
          ? `<button class="btn btn-ghost btn-sm" style="width:auto;padding:0 14px;" onclick="handleToggleNotice('${n.notice_id}','inactive')">撤回</button>`
          : `<button class="btn btn-primary btn-sm" style="width:auto;padding:0 14px;" onclick="handleToggleNotice('${n.notice_id}','active')">重新发布</button>`}
      </div>`).join(''):emptyState('暂无公告')}
  `;
}
function handlePublishNotice(){
  const title = document.getElementById('nt-title').value.trim();
  const content = document.getElementById('nt-content').value.trim();
  const target = document.getElementById('nt-target').value;
  if(!title || !content){ showToast('请填写标题和内容'); return; }
  DB.insert('notice', { notice_id:genId('NT'), publisher_id:currentUser.user_id, title, content, target_role:target, publish_time:Date.now(), status:'active' });
  showToast('公告已发布！');
  refresh();
}
function handleToggleNotice(noticeId, status){
  DB.update('notice','notice_id',noticeId,{ status });
  showToast(status==='active'?'公告已重新发布':'公告已撤回');
  refresh();
}

function screen_staff_status(){
  const skills = DB.get('repairman_skill').slice().sort((a,b)=>(b.avg_score||0)-(a.avg_score||0));
  return `${topnav('维修人员状态')}
  <div class="screen-scroll"><div class="section">
    <div class="card" style="margin-bottom:12px;background:var(--bg);box-shadow:none;">
      <div style="font-size:12px;color:var(--text-tertiary);line-height:1.6;">只读概览，便于外出时快速查看负载与评分；新增/编辑人员请在网页管理端操作。</div>
    </div>
    ${skills.map((s,i)=>{
      const u = getUser(s.repairman_id);
      return `<div class="staff-row">
        <div>
          <div class="sr-name">${i<3?['🥇','🥈','🥉'][i]+' ':''}${esc(u?u.name:s.repairman_id)} <span class="cand-tag">${esc(s.skill_tag)}</span></div>
          <div class="sr-sub">负载 ${s.workload}/5 · ${esc(s.schedule||'—')}</div>
        </div>
        <div class="sr-score">${s.avg_score?s.avg_score.toFixed(1):'—'}★</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* ============================================================
   共享：消息中心 / 公告详情 / 个人中心
   ============================================================ */
const PUSH_ICON = {
  new_order:'send', assigned:'wrench_fill', repairing:'wrench_fill', evaluate_remind:'bell_fill',
  status_change:'bell_fill', complaint_reply:'reply_fill', notice:'notice_fill'
};
const PUSH_COLOR = {
  new_order:'#2F6FED', assigned:'#7C5CFC', repairing:'#2F6FED', evaluate_remind:'#0E8A78',
  status_change:'#6B7280', complaint_reply:'#16834A', notice:'#B5740E'
};
function screen_messages(){
  const msgs = DB.get('message_push').filter(m=>m.user_id===currentUser.user_id).sort((a,b)=>b.push_time-a.push_time);
  return `<div class="topnav" style="justify-content:center;">
    <div class="nav-title" style="position:static;">消息通知</div>
    ${msgs.some(m=>!m.is_read)?`<div class="nav-right" style="position:absolute;right:10px;"><span class="nav-right-text" onclick="handleMarkAllRead()">全部已读</span></div>`:''}
  </div>
  <div class="screen-scroll">
    ${msgs.length?msgs.map(m=>`
      <div class="msg-row" onclick="handleOpenMessage('${m.push_id}')">
        ${!m.is_read?'<div class="unread-dot"></div>':''}
        <div class="msg-icon" style="background:${PUSH_COLOR[m.push_type]||'#6B7280'}1A;color:${PUSH_COLOR[m.push_type]||'#6B7280'}">${ICON[PUSH_ICON[m.push_type]]||ICON.bell_fill}</div>
        <div class="msg-body">
          <div class="msg-top"><span class="msg-title">${esc(pushTitle(m.push_type))}</span><span class="msg-time">${fmtTime(m.push_time)}</span></div>
          <div class="msg-content">${esc(m.content)}</div>
        </div>
      </div>`).join(''):`<div style="padding-top:40px;">${emptyState('暂无消息')}</div>`}
  </div>`;
}
function pushTitle(t){
  return {new_order:'新工单提醒', assigned:'派单提醒', repairing:'维修进度更新', evaluate_remind:'邀请评价', status_change:'工单状态更新', complaint_reply:'投诉回复', notice:'系统公告'}[t]||'系统消息';
}
function handleMarkAllRead(){
  DB.get('message_push').filter(m=>m.user_id===currentUser.user_id && !m.is_read).forEach(m=>DB.update('message_push','push_id',m.push_id,{is_read:true}));
  showToast('全部已读');
  refresh();
}
function handleOpenMessage(pushId){
  const m = DB.get('message_push').find(m=>m.push_id===pushId);
  if(!m) return;
  DB.update('message_push','push_id',pushId,{is_read:true});
  if(m.order_id && getOrder(m.order_id)){ go('order-detail:'+m.order_id); }
  else { refresh(); }
}

function screen_notice_detail(noticeId){
  const n = DB.get('notice').find(n=>n.notice_id===noticeId);
  if(!n) return topnav('公告详情')+`<div class="section">${emptyState('公告不存在')}</div>`;
  return `${topnav('公告详情')}
  <div class="screen-scroll"><div class="section">
    <div class="card">
      <div style="font-size:16px;font-weight:700;color:var(--text);line-height:1.5;">${esc(n.title)}</div>
      <div style="font-size:12px;color:var(--text-tertiary);margin:8px 0 14px;">发布时间：${fmtTime(n.publish_time)}</div>
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.8;">${esc(n.content)}</div>
    </div>
  </div></div>`;
}

/* ---------------- 我的（个人中心，角色相关入口） ---------------- */
function profileEntries(role){
  if(role==='student') return [
    {icon:'list', label:'我的工单', action:"switchTab('orders')"},
    {icon:'feedback', label:'投诉与建议', action:"go('complaint')"},
    {icon:'bell_o', label:'消息通知', action:"switchTab('messages')"},
  ];
  if(role==='dorm_admin') return [
    {icon:'plus', label:'协助登记报修', action:"go('register')"},
    {icon:'list', label:'楼栋工单', action:"switchTab('orders')"},
    {icon:'bell_o', label:'消息通知', action:"switchTab('messages')"},
  ];
  if(role==='repairman') return [
    {icon:'calendar', label:'排班与技能管理', action:"go('schedule')"},
    {icon:'list', label:'我的维修记录', action:"switchTab('history')"},
    {icon:'bell_o', label:'消息通知', action:"switchTab('messages')"},
  ];
  return [
    {icon:'people_o', label:'维修人员状态', action:"go('staff-status')"},
    {icon:'send', label:'待派单工单', action:"switchTab('assign')"},
    {icon:'work_o', label:'工作台（投诉/公告）', action:"switchTab('workbench')"},
    {icon:'bell_o', label:'消息通知', action:"switchTab('messages')"},
  ];
}
function screen_profile(){
  const u = currentUser;
  const entries = profileEntries(u.role);
  return `<div class="screen-scroll">
    <div class="profile-header">
      <div class="avatar">${esc(u.name[0])}</div>
      <div>
        <div class="profile-name">${esc(u.name)}　<span class="badge badge-assigned">${roleName(u.role)}</span></div>
        <div class="profile-sub">${u.user_id} ${u.dorm_building?'· '+esc(u.dorm_building):''}</div>
      </div>
    </div>
    <div class="section" style="padding-top:10px;">
      <div class="card">
        <div class="info-card-row"><span class="k">联系方式</span><span class="v">${maskPhone(u.contact)}</span></div>
        ${u.role==='repairman'?(()=>{const s=getRepairmanSkill(u.user_id);return `<div class="info-card-row"><span class="k">技能专长</span><span class="v">${esc(s?.skill_tag||'—')}</span></div><div class="info-card-row"><span class="k">综合评分</span><span class="v">${s?.avg_score?s.avg_score.toFixed(1)+'★':'—'}</span></div>`;})():''}
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <div class="card" style="padding:0;overflow:hidden;">
        ${entries.map(e=>`<div class="list-row" onclick="${e.action}">
          <div class="lr-left"><span style="color:var(--text-secondary);">${ICON[e.icon]}</span><span class="lr-text">${e.label}</span></div>
          <span class="lr-chevron">${ICON.chevron}</span>
        </div>`).join('')}
        <div class="list-row" onclick="showAboutModal()">
          <div class="lr-left"><span style="color:var(--text-secondary);">${ICON.about}</span><span class="lr-text">关于系统</span></div>
          <span class="lr-chevron">${ICON.chevron}</span>
        </div>
      </div>
    </div>
    <div class="section" style="padding-top:0;">
      <button class="btn" style="background:var(--danger-light);color:var(--danger);" onclick="handleLogoutConfirm()">${ICON.logout} 退出登录</button>
    </div>
    <div style="height:14px;"></div>
  </div>`;
}
function showAboutModal(){
  showModal({ title:'关于本系统', bodyHtml:`<div class="modal-msg">吉林大学宿舍报修系统 · 移动端高保真原型<br>信息系统分析与设计课程项目演示用，数据均为模拟数据。<br><br>5组 · 组长 薛楚滢 35241509<br>组员 侯博文 黄治桦 比努尔·阿曼太</div>`, hideCancel:true, okText:'我知道了', onOk:()=>{} });
}
function handleLogoutConfirm(){
  confirmDialog('退出登录','确认退出当前账号并返回登录页？', ()=>{ doLogout(); }, true);
}

/* ============================================================
   屏幕路由表
   ============================================================ */
const SCREEN_RENDERERS = {
  'login': screen_login,
  'home': screen_home,
  'overview': screen_dorm_overview,
  'tasks': screen_tasks,
  'assign': screen_assign,
  'orders': screen_orders,
  'history': screen_history,
  'workbench': screen_workbench,
  'messages': screen_messages,
  'profile': screen_profile,
  'submit': screen_submit,
  'register': screen_register,
  'schedule': screen_schedule,
  'complaint': screen_complaint,
  'staff-status': screen_staff_status,
  'order-detail': screen_order_detail,
  'evaluate': screen_evaluate,
  'repair-record': screen_repair_record,
  'notice-detail': screen_notice_detail,
};

/* ============================================================
   初始化
   ============================================================ */
function init(){
  tryRestoreSession();
  if(currentUser){ navStack=[TABS[currentUser.role][0].key]; }
  else { navStack=['login']; }
  showStack();
  setClock();
}
function setClock(){
  const d=new Date();
  document.getElementById('clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
init();

</script>
